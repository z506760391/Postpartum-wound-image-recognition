{% extends 'base.html' %}
{% block title %}注册产妇 - 产后伤口智能护理系统{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-pink-light">
                <h4 class="mb-0"><i class="fas fa-user-plus me-2 text-pink"></i>注册新产妇</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('patient.register') }}" novalidate>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">姓名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="name"
                                   value="{{ form_data.get('name', '') if form_data else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">年龄 <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" name="age" min="14" max="60"
                                   value="{{ form_data.get('age', '') if form_data else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">分娩方式 <span class="text-danger">*</span></label>
                            <select class="form-select" name="delivery_method" required>
                                <option value="">请选择</option>
                                <option value="vaginal" {% if form_data and form_data.get('delivery_method')=='vaginal' %}selected{% endif %}>顺产（阴道分娩）</option>
                                <option value="cesarean" {% if form_data and form_data.get('delivery_method')=='cesarean' %}selected{% endif %}>剖宫产</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">分娩日期 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="delivery_date"
                                   value="{{ form_data.get('delivery_date', '') if form_data else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">BMI指数</label>
                            <input type="number" class="form-control" name="bmi" step="0.1" min="10" max="60"
                                   value="{{ form_data.get('bmi', '') if form_data else '' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">妊娠次数</label>
                            <input type="number" class="form-control" name="gravidity" min="1"
                                   value="{{ form_data.get('gravidity', '1') if form_data else '1' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">分娩次数</label>
                            <input type="number" class="form-control" name="parity" min="1"
                                   value="{{ form_data.get('parity', '1') if form_data else '1' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">联系电话</label>
                            <input type="tel" class="form-control" name="contact_phone"
                                   value="{{ form_data.get('contact_phone', '') if form_data else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">情绪状态</label>
                            <select class="form-select" name="emotional_state">
                                <option value="stable" {% if not form_data or form_data.get('emotional_state','stable')=='stable' %}selected{% endif %}>稳定</option>
                                <option value="anxious" {% if form_data and form_data.get('emotional_state')=='anxious' %}selected{% endif %}>焦虑</option>
                                <option value="depressed" {% if form_data and form_data.get('emotional_state')=='depressed' %}selected{% endif %}>抑郁倾向</option>
                                <option value="happy" {% if form_data and form_data.get('emotional_state')=='happy' %}selected{% endif %}>愉快</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">健康状况</label>
                            <textarea class="form-control" name="health_conditions" rows="2"
                                      placeholder="如：糖尿病、高血压、贫血等">{{ form_data.get('health_conditions', '') if form_data else '' }}</textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">过敏史</label>
                            <textarea class="form-control" name="allergies" rows="2"
                                      placeholder="如：青霉素过敏、食物过敏等">{{ form_data.get('allergies', '') if form_data else '' }}</textarea>
                        </div>
                    </div>
                    <div class="mt-4 text-end">
                        <a href="{{ url_for('patient.list_patients') }}" class="btn btn-outline-secondary me-2">取消</a>
                        <button type="submit" class="btn btn-pink">
                            <i class="fas fa-save me-1"></i>保存注册
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
